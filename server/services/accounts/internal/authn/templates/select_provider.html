<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — HSS Science</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:            #f8fafc;   /* slate-50  */
            --surface:       #ffffff;
            --border:        #e2e8f0;   /* slate-200 */
            --border-strong: #94a3b8;   /* slate-400 */
            --text-primary:  #0f172a;   /* slate-900 */
            --text-muted:    #64748b;   /* slate-500 */

            --accent:        #2563eb;   /* blue-600  */
            --accent-hover:  #1d4ed8;   /* blue-700  */
            --accent-fg:     #ffffff;
            --accent-dim:    #eff6ff;   /* blue-50   */
            --accent-border: #bfdbfe;   /* blue-200  */

            --radius:    8px;
            --radius-sm: 6px;
            --font: 'Geist', -apple-system, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            width: 100%;
            max-width: 380px;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.02),
                0 2px 4px rgba(0,0,0,0.04),
                0 12px 32px rgba(0,0,0,0.06);
        }

        .wordmark {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }
        .wordmark-icon {
            width: 30px; height: 30px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .wordmark-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .heading {
            font-size: 20px;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: -0.03em;
            margin-bottom: 4px;
        }
        .subtext {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .providers { display: flex; flex-direction: column; gap: 8px; }

        .provider-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
            text-align: left;
        }
        .provider-btn:hover {
            background: var(--accent-dim);
            border-color: var(--accent-border);
            box-shadow: 0 1px 4px rgba(37,99,235,0.08);
        }
        .provider-btn:active { background: #dbeafe; } /* blue-100 */

        .provider-icon { flex-shrink: 0; display: flex; align-items: center; }
        .provider-label { flex: 1; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">

        <div class="wordmark">
            <div class="wordmark-icon">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                    <path d="M8 1.5L2 5v6l6 3.5L14 11V5L8 1.5z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/>
                </svg>
            </div>
            <span class="wordmark-name">HSS Science</span>
        </div>

        <div class="heading">Sign in</div>
        <div class="subtext">to continue to your workspace</div>

        <div class="providers">
            {{range .Providers}}
            <form method="POST" action="/login/select" style="margin:0">
                <input type="hidden" name="authRequestID" value="{{$.AuthRequestID}}">
                <input type="hidden" name="provider" value="{{.Name}}">
                <button type="submit" class="provider-btn">
                    <span class="provider-icon">
                        {{if eq .Name "google"}}
                        <svg width="16" height="16" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        {{else if eq .Name "github"}}
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="#0f172a">
                            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
                        </svg>
                        {{else if eq .Name "microsoft"}}
                        <svg width="16" height="16" viewBox="0 0 24 24">
                            <path fill="#f25022" d="M1 1h10v10H1z"/>
                            <path fill="#00a4ef" d="M13 1h10v10H13z"/>
                            <path fill="#7fba00" d="M1 13h10v10H1z"/>
                            <path fill="#ffb900" d="M13 13h10v10H13z"/>
                        </svg>
                        {{else}}
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
                            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                        </svg>
                        {{end}}
                    </span>
                    <span class="provider-label">Continue with {{.DisplayName}}</span>
                </button>
            </form>
            {{end}}
        </div>

    </div>
</div>
</body>
</html>

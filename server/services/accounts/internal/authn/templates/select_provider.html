<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', 'Google Sans', system-ui, sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-white text-gray-900">

    <!-- Header -->
    <header class="border-b border-gray-200 px-6 py-3 flex items-center gap-3">
        <!-- Logo placeholder — replace with your app logo/wordmark -->
        <div class="flex items-center gap-2">
            <svg class="w-8 h-8 text-blue-600" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
            </svg>
            <span class="text-lg font-medium text-gray-800">AppName</span>
        </div>
    </header>

    <!-- Main -->
    <main class="flex items-start justify-center min-h-[calc(100vh-57px)] px-4 py-16">
        <div class="w-full max-w-sm">

            <!-- Card -->
            <div class="bg-white border border-gray-200 rounded-2xl shadow-sm px-8 py-10">

                <!-- Title -->
                <h1 class="text-2xl font-normal text-gray-900 mb-1">Sign in</h1>
                <p class="text-sm text-gray-500 mb-8">Choose your sign-in method to continue</p>

                <!-- Provider Buttons -->
                <div class="flex flex-col gap-3">
                    {{range .Providers}}
                    <form method="POST" action="/login/select">
                        <input type="hidden" name="authRequestID" value="{{$.AuthRequestID}}">
                        <input type="hidden" name="provider" value="{{.Name}}">
                        <button
                            type="submit"
                            class="w-full flex items-center justify-center gap-3 px-4 py-3
                                   border border-gray-300 rounded-full text-sm font-medium text-gray-700
                                   bg-white hover:bg-gray-50 active:bg-gray-100
                                   transition-colors duration-150
                                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                        >
                            {{.DisplayName}}
                        </button>
                    </form>
                    {{end}}
                </div>

            </div>

            <!-- Footer note -->
            <p class="text-center text-xs text-gray-400 mt-6">
                By signing in, you agree to our
                <a href="#" class="text-blue-600 hover:underline">Terms</a>
                and
                <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a>.
            </p>

        </div>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:            #0a0a0a;
            --surface:       #111111;
            --border:        #1f1f1f;
            --border-subtle: #181818;
            --text-primary:  #ededed;
            --text-muted:    #666;
            --text-dim:      #333;
            --accent:        #f6821f;
            --accent-dim:    rgba(246,130,31,0.12);
            --radius:        6px;
            --font-sans:     'Geist', sans-serif;
            --font-mono:     'Geist Mono', monospace;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image:
                linear-gradient(var(--border-subtle) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .wrap {
            width: 100%;
            max-width: 360px;
            padding: 24px;
            opacity: 0;
            transform: translateY(8px);
            animation: rise 0.35s ease 0.05s forwards;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
        }
        .wordmark {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 28px;
        }
        .wordmark-icon {
            width: 28px; height: 28px;
            background: var(--accent);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .wordmark-name {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }
        .heading {
            font-size: 17px;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        .subheading {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }
        .divider { height: 1px; background: var(--border); margin-bottom: 24px; }
        .provider-form { margin: 0; }
        .provider-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 13px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .provider-btn:hover {
            border-color: #333;
            background: rgba(255,255,255,0.03);
        }
        .provider-btn:active { background: rgba(255,255,255,0.05); }
        .provider-form + .provider-form { margin-top: 8px; }
        .provider-icon { flex-shrink: 0; display: flex; }
        .provider-label { flex: 1; text-align: left; }
        .provider-arrow { color: var(--text-dim); font-size: 16px; }
        .footer {
            margin-top: 16px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.04em;
        }
        @keyframes rise {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <div class="wordmark">
            <div class="wordmark-icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                    <path d="M8 1L1 5v6l7 4 7-4V5L8 1z" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
            </div>
            <span class="wordmark-name">hss-science.org</span>
        </div>

        <div class="heading">Sign in</div>
        <div class="subheading">Internal access only</div>
        <div class="divider"></div>

        {{range .Providers}}
        <form class="provider-form" method="POST" action="/login/select">
            <input type="hidden" name="authRequestID" value="{{$.AuthRequestID}}">
            <input type="hidden" name="provider" value="{{.Name}}">
            <button type="submit" class="provider-btn">
                <span class="provider-icon">
                    {{if eq .Name "google"}}
                    <svg width="16" height="16" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    {{else}}
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                    {{end}}
                </span>
                <span class="provider-label">Continue with {{.DisplayName}}</span>
                <span class="provider-arrow">›</span>
            </button>
        </form>
        {{end}}
    </div>

    <div class="footer">Restricted system &nbsp;·&nbsp; Unauthorized access prohibited</div>
</div>
</body>
</html>

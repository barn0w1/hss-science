<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — AppName</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-primary:              #1a73e8;
            --md-primary-container:    #d3e3fd;
            --md-on-primary:           #ffffff;
            --md-on-primary-container: #041e49;
            --md-surface:              #ffffff;
            --md-surface-variant:      #f1f3f4;
            --md-on-surface:           #202124;
            --md-on-surface-variant:   #5f6368;
            --md-outline:              #dadce0;
            --md-outline-variant:      #e8eaed;
            --radius-sm:   8px;
            --radius-xl:   28px;
            --radius-full: 9999px;
            --font-brand:  'Google Sans', sans-serif;
            --font-plain:  'Roboto', sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-plain);
            background: var(--md-surface-variant);
            color: var(--md-on-surface);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }
        .card {
            width: 100%;
            max-width: 440px;
            background: var(--md-surface);
            border-radius: var(--radius-xl);
            border: 1px solid var(--md-outline);
            overflow: hidden;
            animation: card-in 300ms cubic-bezier(.2,0,0,1) both;
        }
        @keyframes card-in {
            from { opacity: 0; transform: translateY(16px) scale(.97); }
            to   { opacity: 1; transform: none; }
        }
        .card-header { padding: 40px 40px 28px; }
        .brand {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 28px;
        }
        .brand__icon {
            width: 40px; height: 40px;
            background: var(--md-primary-container);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
        }
        .brand__icon svg { width: 22px; height: 22px; fill: var(--md-primary); }
        .brand__name {
            font-family: var(--font-brand);
            font-size: 20px; font-weight: 500;
            color: var(--md-on-surface); letter-spacing: -.2px;
        }
        .card-title {
            font-family: var(--font-brand);
            font-size: 24px; font-weight: 400;
            color: var(--md-on-surface); margin-bottom: 8px;
        }
        .card-subtitle {
            font-size: 14px;
            color: var(--md-on-surface-variant); line-height: 1.5;
        }
        .divider { height: 1px; background: var(--md-outline-variant); }
        .provider-list { padding: 8px 0; }
        .provider-item + .provider-item { border-top: 1px solid var(--md-outline-variant); }
        .provider-btn {
            width: 100%; display: flex; align-items: center; gap: 16px;
            padding: 14px 40px;
            background: transparent; border: none; cursor: pointer;
            text-align: left; position: relative; overflow: hidden;
            transition: background 150ms;
        }
        .provider-btn:hover  { background: rgba(32,33,36,.06); }
        .provider-btn:active { background: rgba(32,33,36,.12); }
        .provider-btn:focus-visible { outline: 3px solid var(--md-primary); outline-offset: -3px; }
        .provider-btn__avatar {
            width: 40px; height: 40px;
            border-radius: var(--radius-full);
            background: var(--md-surface-variant);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .provider-btn__avatar svg { width: 20px; height: 20px; }
        .provider-btn__text { flex: 1; }
        .provider-btn__name {
            display: block;
            font-family: var(--font-brand); font-size: 15px; font-weight: 500;
            color: var(--md-on-surface);
        }
        .provider-btn__hint {
            display: block; font-size: 12px;
            color: var(--md-on-surface-variant); margin-top: 1px;
        }
        .provider-btn__chevron { color: var(--md-on-surface-variant); flex-shrink: 0; }
        .ripple {
            position: absolute; border-radius: 50%; transform: scale(0);
            animation: ripple 500ms linear;
            background: rgba(26,115,232,.2); pointer-events: none;
        }
        @keyframes ripple { to { transform: scale(4); opacity: 0; } }
        .card-footer {
            border-top: 1px solid var(--md-outline-variant);
            padding: 16px 40px 28px;
        }
        .card-footer p {
            font-size: 12px; color: var(--md-on-surface-variant);
            text-align: center; line-height: 1.6;
        }
        .card-footer a { color: var(--md-primary); text-decoration: none; font-weight: 500; }
        .card-footer a:hover { text-decoration: underline; }
        .page-footer { margin-top: 20px; font-size: 11px; color: var(--md-on-surface-variant); }
        .page-footer a { color: var(--md-on-surface-variant); text-decoration: none; padding: 0 6px; }
        .page-footer a:hover { text-decoration: underline; }
        .page-footer a + a { border-left: 1px solid var(--md-outline); }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <div class="brand">
                <div class="brand__icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
                </div>
                <span class="brand__name">AppName</span>
            </div>
            <h1 class="card-title">Sign in</h1>
            <p class="card-subtitle">Choose your identity provider to continue</p>
        </div>

        <div class="divider"></div>

        <div class="provider-list">
            {{range .Providers}}
            <div class="provider-item">
                <form method="POST" action="/login/select">
                    <input type="hidden" name="authRequestID" value="{{$.AuthRequestID}}">
                    <input type="hidden" name="provider" value="{{.Name}}">
                    <button type="submit" class="provider-btn">
                        <div class="provider-btn__avatar">
                            {{if eq .Name "google"}}
                            {{/* Google 公式 SVG — Google Identity HTML より */}}
                            <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20" height="20" style="display:block;">
                                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                                <path fill="none" d="M0 0h48v48H0z"></path>
                            </svg>
                            {{else if eq .Name "github"}}
                            {{/* GitHub 公式マーク SVG */}}
                            <svg width="20" height="20" viewBox="0 0 98 96" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <g clip-path="url(#clip0_github)">
                                    <path d="M41.4395 69.3848C28.8066 67.8535 19.9062 58.7617 19.9062 46.9902C19.9062 42.2051 21.6289 37.0371 24.5 33.5918C23.2559 30.4336 23.4473 23.7344 24.8828 20.959C28.7109 20.4805 33.8789 22.4902 36.9414 25.2656C40.5781 24.1172 44.4062 23.543 49.0957 23.543C53.7852 23.543 57.6133 24.1172 61.0586 25.1699C64.0254 22.4902 69.2891 20.4805 73.1172 20.959C74.457 23.543 74.6484 30.2422 73.4043 33.4961C76.4668 37.1328 78.0937 42.0137 78.0937 46.9902C78.0937 58.7617 69.1934 67.6621 56.3691 69.2891C59.623 71.3945 61.8242 75.9883 61.8242 81.252L61.8242 91.2051C61.8242 94.0762 64.2168 95.7031 67.0879 94.5547C84.4102 87.9512 98 70.6289 98 49.1914C98 22.1074 75.9883 0 48.9043 0C21.8203 0 0 22.1074 0 49.1914C0 70.4375 13.4941 88.0469 31.6777 94.6504C34.2617 95.6074 36.75 93.8848 36.75 91.3008L36.75 83.6445C35.4102 84.2188 33.6875 84.6016 32.1562 84.6016C25.8398 84.6016 22.1074 81.1563 19.4277 74.7441C18.375 72.1602 17.2266 70.6289 15.0254 70.3418C13.877 70.2461 13.4941 69.7676 13.4941 69.1934C13.4941 68.0449 15.4082 67.1836 17.3223 67.1836C20.0977 67.1836 22.4902 68.9063 24.9785 72.4473C26.8926 75.2227 28.9023 76.4668 31.2949 76.4668C33.6875 76.4668 35.2187 75.6055 37.4199 73.4043C39.0469 71.7773 40.291 70.3418 41.4395 69.3848Z" fill="#24292f"/>
                                </g>
                                <defs>
                                    <clipPath id="clip0_github">
                                        <rect width="98" height="96" fill="white"/>
                                    </clipPath>
                                </defs>
                            </svg>
                            {{else}}
                            <svg viewBox="0 0 24 24" fill="#5f6368" width="20" height="20"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                            {{end}}
                        </div>
                        <div class="provider-btn__text">
                            <span class="provider-btn__name">{{.DisplayName}}</span>
                            <span class="provider-btn__hint">Continue with {{.DisplayName}}</span>
                        </div>
                        <span class="provider-btn__chevron">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                        </span>
                    </button>
                </form>
            </div>
            {{end}}
        </div>

        <div class="card-footer">
            <p>By signing in, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
        </div>
    </div>

    <footer class="page-footer">
        <a href="#">Help</a><a href="#">Privacy</a><a href="#">Terms</a>
    </footer>

    <script>
        document.querySelectorAll('.provider-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                const r = document.createElement('span');
                r.className = 'ripple';
                const rect = btn.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
                btn.appendChild(r);
                setTimeout(() => r.remove(), 600);
            });
        });
    </script>
</body>
</html>

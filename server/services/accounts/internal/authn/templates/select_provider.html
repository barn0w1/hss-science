<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — AppName</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-primary:              #1a73e8;
            --md-primary-container:    #d3e3fd;
            --md-on-primary:           #ffffff;
            --md-on-primary-container: #041e49;
            --md-surface:              #ffffff;
            --md-surface-variant:      #f1f3f4;
            --md-on-surface:           #202124;
            --md-on-surface-variant:   #5f6368;
            --md-outline:              #dadce0;
            --md-outline-variant:      #e8eaed;
            --radius-sm:   8px;
            --radius-xl:   28px;
            --radius-full: 9999px;
            --font-brand:  'Google Sans', sans-serif;
            --font-plain:  'Roboto', sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-plain);
            background: var(--md-surface-variant);
            color: var(--md-on-surface);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }
        .card {
            width: 100%;
            max-width: 440px;
            background: var(--md-surface);
            border-radius: var(--radius-xl);
            border: 1px solid var(--md-outline);
            overflow: hidden;
            animation: card-in 300ms cubic-bezier(.2,0,0,1) both;
        }
        @keyframes card-in {
            from { opacity: 0; transform: translateY(16px) scale(.97); }
            to   { opacity: 1; transform: none; }
        }
        .card-header { padding: 40px 40px 28px; }
        .brand {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 28px;
        }
        .brand__icon {
            width: 40px; height: 40px;
            background: var(--md-primary-container);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
        }
        .brand__icon svg { width: 22px; height: 22px; fill: var(--md-primary); }
        .brand__name {
            font-family: var(--font-brand);
            font-size: 20px; font-weight: 500;
            color: var(--md-on-surface); letter-spacing: -.2px;
        }
        .card-title {
            font-family: var(--font-brand);
            font-size: 24px; font-weight: 400;
            color: var(--md-on-surface); margin-bottom: 8px;
        }
        .card-subtitle {
            font-size: 14px;
            color: var(--md-on-surface-variant); line-height: 1.5;
        }
        .divider { height: 1px; background: var(--md-outline-variant); }
        .provider-list { padding: 8px 0; }
        .provider-item + .provider-item { border-top: 1px solid var(--md-outline-variant); }
        .provider-btn {
            width: 100%; display: flex; align-items: center; gap: 16px;
            padding: 14px 40px;
            background: transparent; border: none; cursor: pointer;
            text-align: left; position: relative; overflow: hidden;
            transition: background 150ms;
        }
        .provider-btn:hover  { background: rgba(32,33,36,.06); }
        .provider-btn:active { background: rgba(32,33,36,.12); }
        .provider-btn:focus-visible { outline: 3px solid var(--md-primary); outline-offset: -3px; }
        .provider-btn__avatar {
            width: 40px; height: 40px;
            border-radius: var(--radius-full);
            background: var(--md-surface-variant);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .provider-btn__avatar svg { width: 20px; height: 20px; }
        .provider-btn__text { flex: 1; }
        .provider-btn__name {
            display: block;
            font-family: var(--font-brand); font-size: 15px; font-weight: 500;
            color: var(--md-on-surface);
        }
        .provider-btn__hint {
            display: block; font-size: 12px;
            color: var(--md-on-surface-variant); margin-top: 1px;
        }
        .provider-btn__chevron { color: var(--md-on-surface-variant); flex-shrink: 0; }
        .ripple {
            position: absolute; border-radius: 50%; transform: scale(0);
            animation: ripple 500ms linear;
            background: rgba(26,115,232,.2); pointer-events: none;
        }
        @keyframes ripple { to { transform: scale(4); opacity: 0; } }
        .card-footer {
            border-top: 1px solid var(--md-outline-variant);
            padding: 16px 40px 28px;
        }
        .card-footer p {
            font-size: 12px; color: var(--md-on-surface-variant);
            text-align: center; line-height: 1.6;
        }
        .card-footer a { color: var(--md-primary); text-decoration: none; font-weight: 500; }
        .card-footer a:hover { text-decoration: underline; }
        .page-footer { margin-top: 20px; font-size: 11px; color: var(--md-on-surface-variant); }
        .page-footer a { color: var(--md-on-surface-variant); text-decoration: none; padding: 0 6px; }
        .page-footer a:hover { text-decoration: underline; }
        .page-footer a + a { border-left: 1px solid var(--md-outline); }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <div class="brand">
                <div class="brand__icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
                </div>
                <span class="brand__name">AppName</span>
            </div>
            <h1 class="card-title">Sign in</h1>
            <p class="card-subtitle">Choose your identity provider to continue</p>
        </div>

        <div class="divider"></div>

        <div class="provider-list">
            {{range .Providers}}
            <div class="provider-item">
                <form method="POST" action="/login/select">
                    <input type="hidden" name="authRequestID" value="{{$.AuthRequestID}}">
                    <input type="hidden" name="provider" value="{{.Name}}">
                    <button type="submit" class="provider-btn">
                        <div class="provider-btn__avatar">
                            {{if eq .Name "google"}}
                            {{/* Google "G" logo — official brand colours */}}
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                            {{else if eq .Name "github"}}
                            {{/* GitHub mark — monochrome */}}
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#24292f">
                                <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
                            </svg>
                            {{else}}
                            {{/* fallback: generic account icon */}}
                            <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                            {{end}}
                        </div>
                        <div class="provider-btn__text">
                            <span class="provider-btn__name">{{.DisplayName}}</span>
                            <span class="provider-btn__hint">Continue with {{.DisplayName}}</span>
                        </div>
                        <span class="provider-btn__chevron">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                        </span>
                    </button>
                </form>
            </div>
            {{end}}
        </div>

        <div class="card-footer">
            <p>By signing in, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
        </div>
    </div>

    <footer class="page-footer">
        <a href="#">Help</a><a href="#">Privacy</a><a href="#">Terms</a>
    </footer>

    <script>
        document.querySelectorAll('.provider-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                const r = document.createElement('span');
                r.className = 'ripple';
                const rect = btn.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
                btn.appendChild(r);
                setTimeout(() => r.remove(), 600);
            });
        });
    </script>
</body>
</html>

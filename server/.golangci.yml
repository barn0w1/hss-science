run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  # 一旦すべてのLinterを無効化（ここで「ウザい」Linterを一掃します）
  disable-all: true
  
  # 本当に必要な、実用的なLinterだけを厳選して有効化
  enable:
    # --- 🛡️ 必須級（バグ・脆弱性を未然に防ぐ） ---
    - govet       # Go公式の基本チェッカー（コンパイラが拾えないバグを検知）
    - errcheck    # エラーの戻り値を無視していないか検知（IdPでは超重要！）
    - staticcheck # 非常に優秀なバグ検知（非推奨関数の使用なども教えてくれる）
    - ineffassign # 無意味な代入（上書きされて使われていない変数など）を検知
    - gosec       # セキュリティ上の脆弱性検知（SQLインジェクションやハードコードされた認証情報など）

    # --- 🧹 メンテナンス性（コードを綺麗に保つ） ---
    - unused      # 使われていない変数、定数、関数、構造体を検知（ゴミを残さない）
    - gosimple    # よりシンプルな書き方（Goらしい書き方）を提案してくれる
    - goimports   # importの順序や抜け漏れを検知・修正
    - misspell    # コメントやコード内の英語のスペルミスを検知（地味にありがたい）

issues:
  # 自動生成されるコードはLintの対象外にする（CIのYAMLにあったパスを指定）
  exclude-dirs:
    - gen
    - bff/gen
    - api/proto

  exclude-rules:
    # テストコードに対する緩和ルール
    # テストファイル内でハードコードしたダミーパスワードや、細かいエラーハンドリングで怒られるのを防ぐ
    - path: _test\.go
      linters:
        - gosec
        - errcheck

    # gosecの特定のルール（例: ファイルパーミッションの警告など、開発初期に邪魔になりやすいもの）を適宜無視したい場合はここに追加します
    # 今回はベースのままにしています。
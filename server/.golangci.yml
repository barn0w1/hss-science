run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  # Disable all linters first to start from a clean baseline
  disable-all: true
  
  # Enable only essential, practical linters
  enable:
    # --- 🛡️ Critical (prevent bugs & vulnerabilities) ---
    - govet       # Official Go checker (catches issues the compiler misses)
    - errcheck    # Detects ignored error returns (critical for IdP)
    - staticcheck # Advanced static analysis (deprecated APIs, subtle bugs)
    - ineffassign # Detects ineffective assignments
    - gosec       # Security checks (e.g. injections, hardcoded secrets)

    # --- 🧹 Maintainability (keep code clean) ---
    - unused      # Finds unused variables, functions, types, etc.
    - gosimple    # Suggests more idiomatic/simpler Go code
    - goimports   # Fixes and validates import formatting
    - misspell    # Detects spelling mistakes in comments and code

issues:
  # Exclude generated code from linting
  exclude-dirs:
    - gen
    - bff/gen
    - api/proto

  exclude-rules:
    # Relax rules for test files
    # Avoid warnings for dummy passwords or simplified error handling in tests
    - path: _test\.go
      linters:
        - gosec
        - errcheck

    # Add specific gosec rule exclusions here if needed
    # (e.g. file permission warnings during early development)
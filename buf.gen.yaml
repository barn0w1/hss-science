version: v2

inputs:
  - directory: api/proto

plugins:
  # 1. Go Structs (Type Definitions)
  - remote: buf.build/protocolbuffers/go
    out: server/gen
    opt: paths=source_relative

  # 2. Go gRPC Communication Code (Server/Client)
  - remote: buf.build/grpc/go
    out: server/gen
    opt: paths=source_relative
syntax = "proto3";

package hss_science.accounts.v1;

import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/barn0w1/hss-science/server/gen/accounts/v1;accountsv1";

// AccountsService provides account management RPCs.
// All RPCs require a valid JWT access token in the "authorization" gRPC metadata key.
// The authenticated user's subject (sub claim) identifies the acting user.
service AccountsService {
  // GetProfile returns the authenticated user's profile.
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);

  // UpdateProfile modifies the authenticated user's profile fields.
  // Only fields specified in update_mask are modified.
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);

  // ListLinkedAccounts returns all federated identity links for the user.
  rpc ListLinkedAccounts(ListLinkedAccountsRequest) returns (ListLinkedAccountsResponse);

  // UnlinkAccount removes a federated identity link.
  // Fails with FAILED_PRECONDITION if it is the user's only remaining identity.
  rpc UnlinkAccount(UnlinkAccountRequest) returns (UnlinkAccountResponse);

  // ListActiveSessions returns all active refresh-token sessions for the user.
  rpc ListActiveSessions(ListActiveSessionsRequest) returns (ListActiveSessionsResponse);

  // RevokeSession terminates a specific session by deleting its refresh token
  // and associated access token.
  rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse);

  // DeleteAccount permanently deletes the user account and all associated data.
  // This is irreversible.
  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);
}

// ---------------------------------------------------------------------------
// Profile
// ---------------------------------------------------------------------------

message Profile {
  string user_id = 1;
  string email = 2;
  bool email_verified = 3;
  string given_name = 4;
  string family_name = 5;
  string picture = 6;
  string locale = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message GetProfileRequest {}

message GetProfileResponse {
  Profile profile = 1;
}

message UpdateProfileRequest {
  // Only given_name, family_name, picture, and locale are mutable.
  Profile profile = 1;
  google.protobuf.FieldMask update_mask = 2;
}

message UpdateProfileResponse {
  Profile profile = 1;
}

// ---------------------------------------------------------------------------
// Linked Accounts
// ---------------------------------------------------------------------------

message LinkedAccount {
  string id = 1;
  string provider = 2;
  string external_sub = 3;
  google.protobuf.Timestamp linked_at = 4;
}

message ListLinkedAccountsRequest {}

message ListLinkedAccountsResponse {
  repeated LinkedAccount linked_accounts = 1;
}

message UnlinkAccountRequest {
  string linked_account_id = 1;
}

message UnlinkAccountResponse {}

// ---------------------------------------------------------------------------
// Sessions
// ---------------------------------------------------------------------------

message Session {
  string session_id = 1;
  string client_id = 2;
  repeated string scopes = 3;
  google.protobuf.Timestamp auth_time = 4;
  google.protobuf.Timestamp expires_at = 5;
  google.protobuf.Timestamp created_at = 6;
}

message ListActiveSessionsRequest {}

message ListActiveSessionsResponse {
  repeated Session sessions = 1;
}

message RevokeSessionRequest {
  string session_id = 1;
}

message RevokeSessionResponse {}

// ---------------------------------------------------------------------------
// Account Deletion
// ---------------------------------------------------------------------------

message DeleteAccountRequest {}

message DeleteAccountResponse {}

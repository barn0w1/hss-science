# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Go backend
  - package-ecosystem: "gomod"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "friday"
    groups:
      golang-dependencies:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
    groups:
      actions-dependencies:
        patterns:
          - "*"

  # Docker Images for identity-service
  - package-ecosystem: "docker"
    directory: "/server/services/identity-service"
    schedule:
      interval: "weekly"
      day: "friday"
    groups:
      docker-dependencies:
        patterns:
          - "*"

  # Docker Images for myaccount-bff
  - package-ecosystem: "docker"
    directory: "/server/services/myaccount-bff"
    schedule:
      interval: "weekly"
      day: "friday"
    groups:
      docker-dependencies:
        patterns:
          - "*"
  
  # Docker Images for blob-service
  - package-ecosystem: "docker"
    directory: "/server/services/blob-service"
    schedule:
      interval: "weekly"
      day: "friday"
    groups:
      docker-dependencies:
        patterns:
          - "*"


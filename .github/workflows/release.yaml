name: Release Docker Images

on:
  push:
    branches: ["main"]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository }} # barn0w1/hss-science

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: accounts
            dockerfile: ./server/services/accounts/Dockerfile
            context: .
            image-name: accounts
            type: backend
          
          - name: myaccount-bff
            dockerfile: ./server/services/myaccount-bff/Dockerfile
            context: .
            image-name: myaccount-bff
            type: backend

          - name: drive-web
            dockerfile: ./web/apps/drive/Dockerfile
            context: .
            image-name: drive-spa
            type: frontend

          - name: chat-web
            dockerfile: ./web/apps/chat/Dockerfile
            context: .
            image-name: chat-spa
            type: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_NAME }}/${{ matrix.image-name }}
          tags: |
            # タグ push 時: semver (例: v0.1.0)
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            
            # format=long を追加し、Ansibleと連携しやすいフルのSHA(40文字)を出力する
            type=sha,format=long,prefix=,enable=${{ github.ref == 'refs/heads/main' }}
            
            # main ブランチの時のみ latest を付与する
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image-name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image-name }}
name: CI

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Backend (Go) Workflow
  ci-backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: accounts
            path: server/services/accounts
            build: ./services/accounts/...
        
          #- name: myaccount-bff
          #  path: server/bff/myaccount
          #  build: ./bff/myaccount/...

    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            changed:
              - '${{ matrix.path }}/**'
              - 'server/internal/**'
              - 'server/gen/**'
              - 'server/bff/gen/**'
              - 'api/proto/**'
              - 'api/openapi/**'
              - 'server/go.mod'
              - 'server/go.sum'

      - name: Set up Go
        if: steps.filter.outputs.changed == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: 'server/go.mod'
          cache: true
          cache-dependency-path: server/go.sum

      - name: GolangCI-Lint
        if: steps.filter.outputs.changed == 'true'
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          install-mode: goinstall
          working-directory: server
          args: >
            --timeout=5m
            ${{ matrix.build }}

      - name: Test
        if: steps.filter.outputs.changed == 'true'
        working-directory: server
        run: go test -v -count=1 -timeout 10m ${{ matrix.build }}

      - name: Verify Build
        if: steps.filter.outputs.changed == 'true'
        working-directory: server
        run: go build -v ${{ matrix.build }}

  # Frontend (TypeScript) Workflow
  ci-frontend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [drive, chat]

    steps:
      - uses: actions/checkout@v6

      # Detect Changes
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            changed:
              - 'web/apps/${{ matrix.app }}/**'
              - 'web/packages/**'
              - 'api/proto/**'
              - 'web/package.json'
              - 'web/pnpm-lock.yaml'

      # Install pnpm (Node.jsのキャッシュを効かせるため、先に実行するように順序を変更)
      - name: Install pnpm
        if: steps.filter.outputs.changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Set up Node.js
      - name: Set up Node.js
        if: steps.filter.outputs.changed == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          # pnpm の依存関係キャッシュを有効化
          cache: 'pnpm'
          cache-dependency-path: 'web/pnpm-lock.yaml'

      # Install Dependencies
      - name: Install Dependencies
        if: steps.filter.outputs.changed == 'true'
        working-directory: web
        run: pnpm install --frozen-lockfile

      # Type Check
      - name: Type Check
        if: steps.filter.outputs.changed == 'true'
        working-directory: web/apps/${{ matrix.app }}
        run: pnpm tsc --noEmit

      # Lint
      - name: Lint
        if: steps.filter.outputs.changed == 'true'
        working-directory: web/apps/${{ matrix.app }}
        run: pnpm lint

      # Build
      - name: Build Check
        if: steps.filter.outputs.changed == 'true'
        working-directory: web/apps/${{ matrix.app }}
        run: pnpm build